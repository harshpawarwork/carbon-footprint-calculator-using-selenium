<!DOCTYPE html>
<html>
<head>
    <title>Carbon Footprint Calculator</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #56ab2f, #a8e063);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 400px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #43e97b;
            font-weight: bold;
            cursor: pointer;
        }

        .result {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            display: none;
        }

        .progress {
            width: 100%;
            height: 20px;
            background: #eee;
            border-radius: 10px;
            margin-top: 10px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Carbon Calculator</h2>

    <input type="number" id="fuel" placeholder="Fuel (km/month)">
    <input type="number" id="electricity" placeholder="Electricity (units)">
    <input type="number" id="waste" placeholder="Waste (kg)">

    <button onclick="calculate()">Calculate</button>

    <div id="resultBox" class="result"></div>

    <div class="progress">
        <div id="bar" class="progress-bar"></div>
    </div>
</div>

<script>
function calculate() {
    let fuel = parseFloat(document.getElementById("fuel").value) || 0;
    let elec = parseFloat(document.getElementById("electricity").value) || 0;
    let waste = parseFloat(document.getElementById("waste").value) || 0;

    let carbon = (fuel * 0.2) + (elec * 0.5) + (waste * 1.5);

    let resultBox = document.getElementById("resultBox");
    let bar = document.getElementById("bar");

    resultBox.style.display = "block";

    let level = "";
    let color = "";

    if (carbon < 30) {
        level = "Low";
        color = "green";
    } else if (carbon < 70) {
        level = "Medium";
        color = "orange";
    } else {
        level = "High";
        color = "red";
    }

    resultBox.innerHTML = "CO2: " + carbon.toFixed(2) + " (" + level + ")";
    resultBox.style.background = color;

    bar.style.width = Math.min(carbon, 100) + "%";
    bar.style.background = color;
}
</script>

</body>
</html>
